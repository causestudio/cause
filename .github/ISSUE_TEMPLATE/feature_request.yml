name: Feature request
description: Suggest an improvement for cause
title: "[Feature]: "
labels: ["feature-request", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should cause do?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Debugging
        - Visualization
        - Diff analysis
        - Test coverage reasoning
        - Evidence mapping
        - IDE integration
        - Documentation
        - Other
    validations:
      required: true